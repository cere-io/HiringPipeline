name: Dinosaur nightly replay

# Fred's 2026-04-17 ask: "continuously re-run with current weight set to surface drift."
# Runs the Dinosaur replay once per night against the same fixtures. Uploads the report as
# a build artifact so anyone can check the delta tables without cloning. Also emits the
# latest report into the drafts/nightly/ directory of the branch so it's diffable over time.

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC daily (~08:17 CET, before SEK)
  workflow_dispatch:        # manual trigger

jobs:
  replay:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci || npm install

      - name: Run Dinosaur (live LLM if ANTHROPIC_API_KEY set, otherwise offline)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DINOSAUR_OFFLINE: ${{ secrets.ANTHROPIC_API_KEY != '' && '0' || '1' }}
          DINOSAUR_PROVIDER: anthropic
          DINOSAUR_MODEL: claude-haiku-4-5
        run: npx tsx scripts/dinosaur.ts

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dinosaur-report-${{ github.run_id }}
          path: drafts/dinosaur-*.md drafts/dinosaur-*.json
          if-no-files-found: error
          retention-days: 30

      - name: Commit nightly snapshot
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/mode-flag-sales-recruiting'
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p drafts/nightly
          cp drafts/dinosaur-report.md "drafts/nightly/$DATE.md"
          cp drafts/dinosaur-data.json "drafts/nightly/$DATE.json"
          git config user.name "dinosaur-bot"
          git config user.email "dinosaur-bot@users.noreply.github.com"
          git add drafts/nightly/
          git diff --cached --quiet || git commit -m "chore(dinosaur): nightly snapshot $DATE"
          git push || echo "push skipped (no new snapshot or protected branch)"
